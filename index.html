<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="/Getting-things-done-BW.ico" />
    <title>GTD Manager</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; }
      html, body { overflow-x: hidden; }
      /* Real viewport height that accounts for mobile browser chrome show/hide;
         falls back to 100vh in browsers without dvh support (declaration order = fallback). */
      .app-shell-height { height: 100vh; height: 100dvh; }
      /* Mobile hardening: layout logic itself is JS-driven via useViewport,
         these are the handful of things real CSS does better than inline styles. */
      @media (max-width: 1024px) {
        html, body { overscroll-behavior-y: contain; }
        * { -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { display: none; }
        * { scrollbar-width: none; -webkit-overflow-scrolling: touch; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
